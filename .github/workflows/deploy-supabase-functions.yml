name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:
    inputs:
      function:
        description: Edge Function to deploy
        required: true
        default: verify-gcash-receipt
        type: choice
        options:
          - verify-gcash-receipt
          - manage-payment-review-notification
          - process-payment-review-notifications
          - review-payment-receipt
          - all

permissions:
  contents: read

concurrency:
  group: supabase-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy changed functions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: zcuufcpkgidmaanxjufo
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Select functions to deploy
        id: functions
        shell: bash
        run: |
          set -euo pipefail

          all_functions=(
            create-payment-session
            payment-webhook
            verify-gcash-receipt
            host-application
            manage-account
            manage-payment-review-notification
            process-payment-review-notifications
            review-payment-receipt
            send-confirmation-email
            process-host-balance-deadlines
            send-reschedule-email
            send-telegram-notification
            integration-status
          )

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.function }}" == "all" ]]; then
              selected=("${all_functions[@]}")
            else
              selected=("${{ inputs.function }}")
            fi
          else
            mapfile -t changed_files < <(
              git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- supabase/functions
            )

            shared_changed=false
            for changed_file in "${changed_files[@]}"; do
              if [[ "$changed_file" == supabase/functions/_shared/* ]]; then
                shared_changed=true
                break
              fi
            done

            if [[ "$shared_changed" == "true" ]]; then
              # The payment-review migration workflow owns these four
              # schema-dependent functions and deploys them only after verifying
              # the production schema. This workflow may deploy the others.
              selected=(
                create-payment-session
                payment-webhook
                host-application
                manage-account
                send-confirmation-email
                process-host-balance-deadlines
                send-reschedule-email
                send-telegram-notification
                integration-status
              )
            else
              mapfile -t selected < <(
                printf '%s\n' "${changed_files[@]}" |
                  awk -F/ '
                    /^supabase\/functions\/[^/]+\// &&
                    $3 != "_shared" &&
                    $3 != "verify-gcash-receipt" &&
                    $3 != "manage-payment-review-notification" &&
                    $3 != "process-payment-review-notifications" &&
                    $3 != "review-payment-receipt" {
                      print $3
                    }
                  ' |
                  sort -u
              )
            fi
          fi

          if [[ ${#selected[@]} -eq 0 ]]; then
            echo "No deployable Edge Function changed."
            echo "names=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          names="${selected[*]}"
          echo "Deploying: $names"
          echo "names=$names" >> "$GITHUB_OUTPUT"

      - name: Deploy Edge Functions
        if: steps.functions.outputs.names != ''
        shell: bash
        run: |
          set -euo pipefail
          for function_name in ${{ steps.functions.outputs.names }}; do
            supabase functions deploy "$function_name" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
          done
